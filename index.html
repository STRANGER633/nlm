<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NLM Presentation Library</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
margin:0;
background:#faf9ff;
}

/* HERO */

.hero{
text-align:center;
padding:60px 20px;
background:linear-gradient(135deg,#7c6cff,#b9a9ff);
color:white;
}

.hero h1{
font-size:42px;
margin-bottom:10px;
}

.hero p{
font-size:18px;
margin-bottom:25px;
}

#searchBar{
width:60%;
max-width:500px;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
}

/* CATEGORY FILTER */

.categories{
text-align:center;
margin-top:20px;
}

.categories button{
padding:8px 14px;
margin:4px;
border:none;
border-radius:6px;
background:white;
cursor:pointer;
}

.categories button:hover{
background:#eee;
}

/* GRID */

#pptContainer{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:25px;
padding:40px;
}

/* CARD */

.card{
background:white;
border-radius:16px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
transition:0.3s;
}

.card:hover{
transform:translateY(-6px);
}

.thumb{
height:180px;
}

.thumb img{
width:100%;
height:100%;
object-fit:cover;
}

.cardContent{
padding:20px;
}

.cardContent h3{
margin-bottom:10px;
}

.meta{
font-size:14px;
color:#777;
margin-bottom:15px;
}

.buttons button,
.buttons a{
padding:8px 14px;
border:none;
border-radius:6px;
background:#7c6cff;
color:white;
text-decoration:none;
cursor:pointer;
font-size:14px;
margin-right:6px;
}

.buttons button:hover,
.buttons a:hover{
background:#5c4cff;
}

</style>
</head>

<body>

<section class="hero">

<h1>NLM Presentation Library</h1>
<p>Browse and download presentations</p>

<input
type="text"
id="searchBar"
placeholder="Search presentations..."
onkeyup="filterPPT()"
/>

<div class="categories" id="categoryButtons">
<button onclick="setCategory('All')">All</button>
</div>

</section>

<div id="pptContainer"></div>

<script>

const username="STRANGER633";
const repo="nlm";
const folder="files";

let currentCategory="All";

const container=document.getElementById("pptContainer");
const categoryButtons=document.getElementById("categoryButtons");

async function loadPPTs(){

const url=`https://api.github.com/repos/${username}/${repo}/contents/${folder}`;

const res=await fetch(url);
const data=await res.json();

let categories=new Set();

data.forEach(file=>{

if(file.name.endsWith(".ppt") || file.name.endsWith(".pptx")){

let parts=file.name.replace(".pptx","").replace(".ppt","").split("_");

let category=parts[0];
let title=parts.slice(1).join(" ");

categories.add(category);

let card=document.createElement("div");
card.className="card";
card.dataset.category=category.toLowerCase();
card.dataset.title=title.toLowerCase();

card.innerHTML=`

<div class="thumb">
<img src="opengraph-image.png">
</div>

<div class="cardContent">

<h3>${title}</h3>

<div class="meta">
Category: ${category}
</div>

<div class="buttons">

<button onclick="viewPPT('${file.download_url}')">View</button>

<button onclick="presentPPT('${file.download_url}')">Present</button>

<a href="${file.download_url}" download>Download</a>

</div>

</div>
`;

container.appendChild(card);

}

});

createCategoryButtons(categories);

}

loadPPTs();

function createCategoryButtons(categories){

categories.forEach(cat=>{

let btn=document.createElement("button");
btn.innerText=cat;
btn.onclick=()=>setCategory(cat);

categoryButtons.appendChild(btn);

});

}

function setCategory(cat){

currentCategory=cat;
filterPPT();

}

function filterPPT(){

let search=document.getElementById("searchBar").value.toLowerCase();

let cards=document.querySelectorAll(".card");

cards.forEach(card=>{

let title=card.dataset.title;
let category=card.dataset.category;

let matchTitle=title.includes(search);
let matchCategory=currentCategory==="All" || category===currentCategory.toLowerCase();

if(matchTitle && matchCategory){
card.style.display="block";
}else{
card.style.display="none";
}

});

}

function viewPPT(url){

window.open(
"https://view.officeapps.live.com/op/embed.aspx?src="+encodeURIComponent(url)
);

}

function presentPPT(url){

window.open(
"https://view.officeapps.live.com/op/view.aspx?src="+encodeURIComponent(url)
);

}

</script>

</body>
</html>
