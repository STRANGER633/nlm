<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NLM Presentation Library</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
margin:0;
background:#faf9ff;
}

/* HERO SECTION */

.hero{
text-align:center;
padding:60px 20px;
background:linear-gradient(135deg,#7c6cff,#b9a9ff);
color:white;
}

.hero h1{
font-size:42px;
margin-bottom:10px;
}

.hero p{
font-size:18px;
margin-bottom:25px;
}

#searchBar{
width:60%;
max-width:500px;
padding:14px 18px;
border:none;
border-radius:10px;
font-size:16px;
outline:none;
}

/* CARD GRID */

#pptContainer{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:25px;
padding:40px;
}

/* CARD */

.card{
background:white;
border-radius:16px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
transition:0.3s;
}

.card:hover{
transform:translateY(-6px);
}

.thumb{
height:180px;
}

.thumb img{
width:100%;
height:100%;
object-fit:cover;
}

.cardContent{
padding:20px;
}

.cardContent h3{
font-size:22px;
margin-bottom:10px;
}

.meta{
font-size:14px;
color:#777;
margin-bottom:15px;
}

/* BUTTONS */

.buttons button,
.buttons a{

padding:8px 14px;
border:none;
border-radius:6px;
background:#7c6cff;
color:white;
text-decoration:none;
cursor:pointer;
font-size:14px;
margin-right:6px;
}

.buttons button:hover,
.buttons a:hover{
background:#5c4cff;
}

/* FUTURE FEATURE (CATEGORIES)

.category{
display:inline-block;
padding:4px 8px;
background:#eee;
border-radius:5px;
font-size:12px;
margin-bottom:10px;
}

*/

</style>
</head>

<body>

<section class="hero">

<h1>NLM Presentation Library</h1>
<p>Browse and download presentations</p>

<input
type="text"
id="searchBar"
placeholder="Search presentations..."
onkeyup="searchPPT()"
/>

</section>

<div id="pptContainer"></div>

<script>

const username = "STRANGER633";   // your github username
const repo = "nlm";   // your repo name
const folder = "files";

const container = document.getElementById("pptContainer");

async function loadPPTs(){

const url = `https://api.github.com/repos/${username}/${repo}/contents/${folder}`;

const response = await fetch(url);
const data = await response.json();

data.forEach(file => {

if(file.name.endsWith(".ppt") || file.name.endsWith(".pptx")){

let title = file.name.replace(".pptx","").replace(".ppt","");

let div = document.createElement("div");

div.className="card";

div.innerHTML = `

<div class="thumb">
<img src="opengraph-image.png">
</div>

<div class="cardContent">

<h3>${title}</h3>

<div class="meta">
PPT Presentation
</div>

<div class="buttons">

<button onclick="viewPPT('${file.name}')">View</button>

<button onclick="presentPPT('${file.name}')">Present</button>

<a href="files/${file.name}" download>Download</a>

</div>

</div>

`;

container.appendChild(div);

}

});

}

loadPPTs();

function viewPPT(file){

window.open(
"https://view.officeapps.live.com/op/embed.aspx?src=" +
location.origin + "/files/" + file
);

}

function presentPPT(file){

window.open(
"https://view.officeapps.live.com/op/view.aspx?src=" +
location.origin + "/files/" + file
);

}

function searchPPT(){

let input = document.getElementById("searchBar").value.toLowerCase();
let cards = document.querySelectorAll(".card");

cards.forEach(card => {

let title = card.querySelector("h3").innerText.toLowerCase();

if(title.includes(input)){
card.style.display="block";
}else{
card.style.display="none";
}

});

}

</script>

</body>
</html>
