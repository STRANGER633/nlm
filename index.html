<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NLM Presentation Library</title>

<style>

/* PAGE BACKGROUND */

/* PAGE BACKGROUND */

body{
font-family:Arial, Helvetica, sans-serif;
margin:0;
background:linear-gradient(135deg,#dcdcdc,#bfbfbf);
min-height:100vh;
}

/* TITLE */

.title{
text-align:center;
margin-top:40px;
font-size:42px;
color:black;
}

.subtitle{
text-align:center;
margin-bottom:30px;
font-size:18px;
color:#333;
}

/* FLOATING SEARCH BAR */

.hero{

position:sticky;
top:0;

display:flex;
justify-content:center;

padding:15px;

background:rgba(255,255,255,0.55);

backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);

border-bottom:1px solid rgba(255,255,255,0.4);

z-index:1000;
}

/* SEARCH BAR */

#searchBar{

width:65%;
max-width:650px;

padding:16px 20px;

border-radius:14px;
border:none;
outline:none;

background:rgba(255,255,255,0.75);

backdrop-filter:blur(10px);

font-size:16px;
}

/* GRID */

#pptContainer{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:25px;
padding:40px;
}

/* GLASS CARD */

.card{

background:rgba(255,255,255,0.6);

backdrop-filter:blur(15px);
-webkit-backdrop-filter:blur(15px);

border-radius:16px;

box-shadow:0 8px 32px rgba(0,0,0,0.15);

overflow:hidden;

transition:all 0.3s ease;

border:1px solid rgba(255,255,255,0.4);
}

.card:hover{
transform:translateY(-6px) scale(1.02);
}

/* THUMB */

.thumb{
height:180px;
}

.thumb img{
width:100%;
height:100%;
object-fit:cover;
}

/* CARD TEXT */

.cardContent{
padding:20px;
}

.cardContent h3{
font-size:22px;
margin-bottom:15px;
color:black;
}

/* BUTTONS */

.buttons button,
.buttons a{

padding:8px 14px;

border-radius:8px;

border:none;

background:rgba(255,255,255,0.5);

backdrop-filter:blur(6px);

color:black;

cursor:pointer;

text-decoration:none;

font-size:14px;

margin-right:6px;

transition:0.2s;
}

.buttons button:hover,
.buttons a:hover{
background:rgba(255,255,255,0.85);
}

/* FLOATING GLASS HEADER */

.hero{

position:sticky;
top:0;

text-align:center;

padding:25px 20px;

background:rgba(255,255,255,0.55);

backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);

border-bottom:1px solid rgba(255,255,255,0.4);

z-index:1000;
}

.hero h1{
font-size:34px;
margin-bottom:6px;
color:black;
}

.hero p{
font-size:16px;
margin-bottom:15px;
color:#222;
}

/* SEARCH BAR */

#searchBar{
width:60%;
max-width:500px;
padding:14px 18px;

border-radius:12px;
border:none;
outline:none;

background:rgba(255,255,255,0.7);

backdrop-filter:blur(10px);

font-size:16px;
}

/* GRID */

#pptContainer{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:25px;
padding:40px;
}

/* GLASS CARDS */

.card{

background:rgba(255,255,255,0.6);

backdrop-filter:blur(15px);
-webkit-backdrop-filter:blur(15px);

border-radius:16px;

box-shadow:0 8px 32px rgba(0,0,0,0.15);

overflow:hidden;

transition:all 0.3s ease;

border:1px solid rgba(255,255,255,0.4);
}

.card:hover{
transform:translateY(-6px) scale(1.02);
box-shadow:0 12px 40px rgba(0,0,0,0.25);
}

/* THUMB */

.thumb{
height:180px;
}

.thumb img{
width:100%;
height:100%;
object-fit:cover;
}

/* CONTENT */

.cardContent{
padding:20px;
}

.cardContent h3{
font-size:22px;
margin-bottom:15px;
color:black;
}

/* BUTTONS */

.buttons button,
.buttons a{

padding:8px 14px;

border-radius:8px;

border:none;

background:rgba(255,255,255,0.5);

backdrop-filter:blur(6px);

color:black;

cursor:pointer;

text-decoration:none;

font-size:14px;

margin-right:6px;

transition:0.2s;
}

.buttons button:hover,
.buttons a:hover{
background:rgba(255,255,255,0.85);
}

</style>
</head>

<body>

<section class="hero">

<h1>NLM Presentation Library</h1>


<input
type="text"
id="searchBar"
placeholder="Search presentations..."
onkeyup="searchPPT()"
/>

</section>

<div id="pptContainer"></div>

<script>

const username="STRANGER633";
const repo="nlm";
const folder="files";

const container=document.getElementById("pptContainer");

async function loadPPTs(){

const url=`https://api.github.com/repos/${username}/${repo}/contents/${folder}`;

const response=await fetch(url);
const data=await response.json();

data.forEach(file=>{

if(file.name.endsWith(".ppt") || file.name.endsWith(".pptx")){

let title=file.name.replace(".pptx","").replace(".ppt","");

let div=document.createElement("div");
div.className="card";

div.innerHTML=`

<div class="thumb">
<img src="opengraph-image.png">
</div>

<div class="cardContent">

<h3>${title}</h3>

<div class="buttons">

<button onclick="viewPPT('${file.download_url}')">View</button>

<button onclick="presentPPT('${file.download_url}')">Present</button>

<a href="${file.download_url}" download>Download</a>

</div>

</div>
`;

container.appendChild(div);

}

});

}

loadPPTs();

function viewPPT(url){

window.open(
"https://view.officeapps.live.com/op/embed.aspx?src="+encodeURIComponent(url)
);

}

function presentPPT(url){

window.open(
"https://view.officeapps.live.com/op/view.aspx?src="+encodeURIComponent(url)
);

}

function searchPPT(){

let input=document.getElementById("searchBar").value.toLowerCase();
let cards=document.querySelectorAll(".card");

cards.forEach(card=>{

let title=card.querySelector("h3").innerText.toLowerCase();

if(title.includes(input)){
card.style.display="block";
}else{
card.style.display="none";
}

});

}

</script>

</body>
</html>
