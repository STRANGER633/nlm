```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NLM PPT Library</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

body{
min-height:100vh;
background:linear-gradient(135deg,#ffffff,#e6ddff,#cbb6ff);
display:flex;
justify-content:center;
padding:40px;
color:#2d1b69;
}

.container{
width:100%;
max-width:1400px;
background:rgba(255,255,255,0.85);
backdrop-filter:blur(12px);
border-radius:20px;
padding:40px;
box-shadow:0 10px 40px rgba(0,0,0,0.1);
}

h1{
text-align:center;
font-size:42px;
margin-bottom:10px;
}

.subtitle{
text-align:center;
margin-bottom:30px;
opacity:0.8;
}

.searchBox{
display:flex;
justify-content:center;
margin-bottom:20px;
}

input{
width:400px;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

#results{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:30px;
margin-top:30px;
}

.card{
background:white;
border-radius:14px;
overflow:hidden;
transition:0.3s;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card:hover{
transform:scale(1.05);
}

.thumb{
height:150px;
}

.thumb img{
width:100%;
height:100%;
object-fit:cover;
}

.cardContent{
padding:15px;
}

.cardContent h3{
font-size:20px;
font-weight:600;
margin-bottom:12px;
}

button{
padding:8px 14px;
border:none;
border-radius:6px;
background:#7b5cff;
color:white;
cursor:pointer;
margin-right:5px;
}

button:hover{
background:#5f43e9;
}

a{
padding:8px 14px;
border-radius:6px;
background:#ddd;
text-decoration:none;
color:black;
}

#viewer{
margin-top:40px;
display:none;
}

iframe{
width:100%;
height:550px;
border:none;
border-radius:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>NLM</h1>
<p class="subtitle">Presentation Library</p>

<div class="searchBox">
<input id="searchInput" placeholder="Search presentations..." onkeyup="searchFiles()">
</div>

<div id="results"></div>

<div id="viewer">
<h3>Presentation Viewer</h3>
<iframe id="pptViewer"></iframe>
</div>

</div>

<script>

const username="STRANGER633";
const repo="nlm";
const folder="files";

let pptFiles=[];

async function loadFiles(){

const api=`https://api.github.com/repos/${username}/${repo}/contents/${folder}`;

const response=await fetch(api);
const data=await response.json();

pptFiles = data.filter(file =>
file.name.endsWith(".ppt") || file.name.endsWith(".pptx")
);

displayFiles(pptFiles);

}

function displayFiles(files){

let resultsDiv=document.getElementById("results");
resultsDiv.innerHTML="";

files.forEach(file=>{

let title=file.name
.replace(".pptx","")
.replace(".ppt","")
.replaceAll("_"," ");

let div=document.createElement("div");
div.className="card";

div.innerHTML=`

<div class="thumb">
<img src="opengraph-image.png">
</div>

<div class="cardContent">

<h3>${title}</h3>

<button onclick="viewPPT('${file.name}')">View</button>

<button onclick="presentPPT('${file.name}')">Present</button>

<a href="files/${file.name}" download>Download</a>

</div>

`;

resultsDiv.appendChild(div);

});

}

function searchFiles(){

let query=document.getElementById("searchInput").value.toLowerCase();

let filtered = pptFiles.filter(file =>
file.name.toLowerCase().includes(query)
);

displayFiles(filtered);

}

function viewPPT(file){

let viewer=document.getElementById("viewer");
let frame=document.getElementById("pptViewer");

viewer.style.display="block";

let url=`https://STRANGER633.github.io/nlm/files/${file}`;

frame.src="https://view.officeapps.live.com/op/embed.aspx?src="+encodeURIComponent(url);

}

function presentPPT(file){

let url=`https://STRANGER633.github.io/nlm/files/${file}`;

window.open(
"https://view.officeapps.live.com/op/view.aspx?src="+encodeURIComponent(url)+"&wdSlideShow=true",
"_blank"
);

}

/* FUTURE FEATURE (CATEGORIES)

Example folder structure later:

files/
 ├ cybersecurity/
 ├ cloud/
 ├ networking/

We can detect folder names and group presentations
into categories on the page.

*/

loadFiles();

</script>

</body>
</html>
