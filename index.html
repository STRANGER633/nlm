<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NLM v2</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

body{
min-height:100vh;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
display:flex;
justify-content:center;
padding:40px;
color:white;
}

.container{
width:900px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
border-radius:20px;
padding:40px;
box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

h1{
text-align:center;
font-size:40px;
margin-bottom:10px;
}

.subtitle{
text-align:center;
opacity:0.8;
margin-bottom:30px;
}

.searchBox{
display:flex;
gap:10px;
margin-bottom:20px;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:8px;
background:rgba(255,255,255,0.15);
color:white;
}

button{
padding:10px 15px;
border:none;
border-radius:6px;
background:#00c6ff;
color:white;
cursor:pointer;
}

#results{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:25px;
margin-top:30px;
}

.card{
background:rgba(255,255,255,0.08);
border-radius:14px;
overflow:hidden;
transition:0.3s;
cursor:pointer;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

.thumb{
height:140px;
background:linear-gradient(135deg,#00c6ff,#0072ff);
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:bold;
}

.cardContent{
padding:15px;
}

.cardContent h3{
font-size:16px;
margin-bottom:10px;
}

.card h3{
margin-bottom:10px;
}

.card button, .card a{
margin-right:5px;
margin-top:5px;
display:inline-block;
}

#viewer{
margin-top:40px;
display:none;
}

iframe{
width:100%;
height:500px;
border:none;
border-radius:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>NLM</h1>
<p class="subtitle">PPT Library</p>

<div class="searchBox">
<input id="searchInput" placeholder="Search presentations..." onekeyup="searchFiles()">
<button onclick="searchFiles()">Search</button>
</div>

<div id="results"></div>

<div id="viewer">
<h3>Presentation Viewer</h3>
<iframe id="pptViewer"></iframe>
</div>

</div>

<script>

const username="stranger633";
const repo="nlm";
const folder="files";

let pptFiles=[];

async function loadFiles(){

const api=`https://api.github.com/repos/${username}/${repo}/contents/${folder}`;

const response=await fetch(api);
const data=await response.json();

pptFiles = data.filter(file =>
file.name.endsWith(".ppt") || file.name.endsWith(".pptx")
);

displayFiles(pptFiles);

}

function displayFiles(files){

let resultsDiv=document.getElementById("results");
resultsDiv.innerHTML="";

files.forEach(file=>{

let title=file.name
.replace(".pptx","")
.replace(".ppt","")
.replaceAll("_"," ");

let div=document.createElement("div");
div.className="card";

div.innerHTML=`

<div class="thumb">
<img src="opengraph-image.png" style="width:100%;height:100%;object-fit:cover;">
</div>

<div class="cardContent">

<h3>${title}</h3>

<button onclick="viewPPT('${file.name}')">View</button>

<button onclick="presentPPT('${file.name}')">Present</button>

<a href="files/${file.name}" download>Download</a>

</div>

`;

resultsDiv.appendChild(div);

});

}

function searchFiles(){

let query=document.getElementById("searchInput").value.toLowerCase();

let filtered = pptFiles.filter(file =>
file.name.toLowerCase().includes(query)
);

displayFiles(filtered);

}

function viewPPT(file){

let viewer=document.getElementById("viewer");
let frame=document.getElementById("pptViewer");

viewer.style.display="block";

let url=`https://stranger633.github.io/nlm/files/${file}`;

frame.src="https://view.officeapps.live.com/op/embed.aspx?src="+encodeURIComponent(url);

}

function presentPPT(file){

let url=`https://stranger633.github.io/nlm/files/${file}`;

window.open(
"https://view.officeapps.live.com/op/view.aspx?src="+encodeURIComponent(url)+"&wdSlideShow=true",
"_blank"
);

}

loadFiles();

</script>
</body>
</html>
