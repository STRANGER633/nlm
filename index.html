<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NLM Presentation Library</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
margin:0;
background:linear-gradient(135deg,#dcdcdc,#bfbfbf);
min-height:100vh;
}

/* HEADER */

.hero{
position:sticky;
top:0;

display:flex;
justify-content:space-between;
align-items:center;

padding:20px 30px;

background:rgba(255,255,255,0.55);
backdrop-filter:blur(20px);

border-bottom:1px solid rgba(255,255,255,0.4);

z-index:1000;
}

.hero h1{
margin:0;
font-size:28px;
color:black;
}

/* SEARCH */

#searchBar{

width:320px;
padding:12px 16px;

border-radius:10px;
border:none;
outline:none;

background:rgba(255,255,255,0.8);

font-size:15px;
}

/* GRID */

#pptContainer{

display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));

gap:25px;

padding:40px;

}

/* CARD */

.card{

background:rgba(255,255,255,0.65);

backdrop-filter:blur(12px);

border-radius:16px;

box-shadow:0 8px 30px rgba(0,0,0,0.15);

overflow:hidden;

transition:0.25s;

}

.card:hover{

transform:translateY(-5px);

box-shadow:0 12px 40px rgba(0,0,0,0.25);

}

/* THUMB */

.thumb{

height:180px;

}

.thumb img{

width:100%;
height:100%;

object-fit:cover;

}

/* CONTENT */

.cardContent{

padding:18px;

}

.cardContent h3{

margin:0 0 10px 0;

font-size:20px;

}

.meta{

font-size:13px;
color:#444;
margin-bottom:12px;

}

/* BUTTONS */

.buttons button,
.buttons a{

padding:7px 12px;

border-radius:8px;

border:none;

background:rgba(255,255,255,0.6);

cursor:pointer;

text-decoration:none;

color:black;

font-size:13px;

margin-right:5px;

}

.buttons button:hover,
.buttons a:hover{

background:white;

}

/* LOADING */

#loading{

text-align:center;
font-size:20px;
padding:60px;
color:#333;

}

/* FOOTER */

#footer{

text-align:center;

padding:25px;

font-size:16px;

color:#333;

}

</style>
</head>

<body>

<header class="hero">

<h1>NLM Presentation Library</h1>

<input
type="text"
id="searchBar"
placeholder="Search presentations..."
onkeyup="searchPPT()"
/>

</header>

<div id="loading">Loading presentations...</div>

<div id="pptContainer"></div>

<div id="footer"></div>

<script>

const username="STRANGER633";
const repo="nlm";
const folder="files";

const container=document.getElementById("pptContainer");
const loading=document.getElementById("loading");
const footer=document.getElementById("footer");

async function getFileDate(filePath){

const api=`https://api.github.com/repos/${username}/${repo}/commits?path=${folder}/${filePath}&per_page=1`;

const res=await fetch(api);
const data=await res.json();

return new Date(data[0].commit.committer.date);

}

function formatDate(date){

return date.toLocaleDateString("en-US",{
year:"numeric",
month:"short",
day:"numeric"
});

}

function formatSize(bytes){

return (bytes/1024/1024).toFixed(2)+" MB";

}

async function loadPPTs(){

const url=`https://api.github.com/repos/${username}/${repo}/contents/${folder}`;

const response=await fetch(url);
const data=await response.json();

let files=[];

for(const file of data){

if(file.name.endsWith(".ppt") || file.name.endsWith(".pptx")){

const date=await getFileDate(file.name);

files.push({
name:file.name,
url:file.download_url,
size:file.size,
date:date
});

}

}

/* SORT NEWEST FIRST */

files.sort((a,b)=>b.date-a.date);

loading.style.display="none";

/* CREATE CARDS */

files.forEach(file=>{

let title=file.name.replace(".pptx","").replace(".ppt","");

let thumbnail=`https://raw.githubusercontent.com/${username}/${repo}/main/thumbnails/${title}.png`;

let div=document.createElement("div");
div.className="card";

div.innerHTML=`

<div class="thumb">
<img src="${thumbnail}" onerror="this.src='opengraph-image.png'">
</div>

<div class="cardContent">

<h3>${title}</h3>

<div class="meta">

Size: ${formatSize(file.size)}<br>
Updated: ${formatDate(file.date)}

</div>

<div class="buttons">

<button onclick="viewPPT('${file.url}')">View</button>

<button onclick="presentPPT('${file.url}')">Present</button>

<a href="${file.url}" download>Download</a>

</div>

</div>
`;

container.appendChild(div);

});

/* TOTAL COUNT */

footer.innerHTML=`Total Presentations: ${files.length}`;

}

loadPPTs();

function viewPPT(url){

window.open(
"https://view.officeapps.live.com/op/embed.aspx?src="+encodeURIComponent(url)
);

}

function presentPPT(url){

window.open(
"https://view.officeapps.live.com/op/view.aspx?src="+encodeURIComponent(url)
);

}

function searchPPT(){

let input=document.getElementById("searchBar").value.toLowerCase();
let cards=document.querySelectorAll(".card");

cards.forEach(card=>{

let title=card.querySelector("h3").innerText.toLowerCase();

card.style.display=title.includes(input) ? "block" : "none";

});

}

</script>

</body>
</html>
