<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NLM Presentation Library</title>

<style>

/* BACKGROUND */

body{
margin:0;
font-family:Arial,sans-serif;

background:
linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
url("wallper.png");

background-size:cover;
background-position:center;
background-attachment:fixed;
background-repeat:no-repeat;

color:white;
}

/* HEADER */

.hero{
position:sticky;
top:0;
display:flex;
align-items:center;
gap:20px;
padding:20px 30px;
background:rgba(255,255,255,0.55);
backdrop-filter:blur(20px);
border-bottom:1px solid rgba(255,255,255,0.4);
z-index:1000;
}

.hero h1{
margin:0;
font-size:26px;
flex:1;
}

#searchBar{
width:300px;
padding:12px 16px;
border-radius:10px;
border:none;
outline:none;
background:rgba(255,255,255,0.85);
}

#darkToggle{
cursor:pointer;
font-size:20px;
margin-left:auto;
}

/* DARK MODE */

body.dark{
color:white;
}

body.dark .hero{
background:rgba(20,20,20,0.85);
}

body.dark #searchBar{
background:#2a2a2a;
color:white;
}

body.dark .buttons button,
body.dark .buttons a{
background:#333;
color:white;
}

/* TRENDING */

.trending{
margin:40px;
padding:30px;
border:2px solid rgba(255,255,255,0.7);
background:rgba(255,255,255,0.05);
backdrop-filter:blur(6px);
}

.trending h2{
margin-bottom:20px;
font-size:22px;
}

#trendingContainer{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:25px;
}

/* GOLD GLOW */

.trendingCard{
border:1px solid rgba(255,215,0,0.7);
box-shadow:
0 0 12px rgba(255,215,0,0.45),
0 0 28px rgba(255,215,0,0.25);
}

.trendingCard:hover{
box-shadow:
0 0 18px rgba(255,215,0,0.65),
0 0 38px rgba(255,215,0,0.35);
}

/* GRID */

#pptContainer{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:25px;
padding:40px;
}

/* CARD */

.card{
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.6);
border-radius:0;
backdrop-filter:blur(6px);
transition:transform 0.25s ease, box-shadow 0.3s ease;
overflow:hidden;
transform-style:preserve-3d;

box-shadow:0 0 10px rgba(0,0,0,0.25);
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 18px rgba(0,0,0,0.45);
}

body.dark .card{
box-shadow:0 0 10px rgba(255,255,255,0.18);
}

body.dark .card:hover{
box-shadow:0 0 20px rgba(255,255,255,0.35);
}

/* THUMB */

.thumb{
height:180px;
position:relative;
}

.thumb img{
width:100%;
height:100%;
object-fit:cover;
}

.thumb::after{
content:"";
position:absolute;
bottom:0;
left:0;
right:0;
height:70px;
background:linear-gradient(to top,rgba(0,0,0,0.6),transparent);
}

/* CONTENT */

.cardContent{
padding:18px;
}

.meta{
font-size:13px;
margin-bottom:12px;
}

/* BUTTONS */

.buttons button,
.buttons a{
padding:7px 12px;
border-radius:6px;
border:none;
background:rgba(255,255,255,0.6);
cursor:pointer;
text-decoration:none;
color:black;
font-size:13px;
margin-right:5px;
}

.likeBtn{
background:rgba(255,255,255,0.4);
border:none;
padding:6px 10px;
cursor:pointer;
}

.likeBtn:hover{
transform:scale(1.1);
}

/* LOADING */

#loading{
text-align:center;
font-size:20px;
padding:60px;
}

/* FOOTER */

.footerBar{
padding:30px;
background:#111;
color:white;
margin-top:40px;
}

/* STATS BAR */

.statsBar{
display:flex;
gap:40px;
font-size:16px;
margin-bottom:20px;
border-bottom:1px solid rgba(255,255,255,0.2);
padding-bottom:15px;
}

/* FOOTER CONTENT */

.footerContent{
display:flex;
justify-content:space-between;
flex-wrap:wrap;
gap:20px;
}

.feedbackBox{
display:flex;
gap:10px;
}

.feedbackBox input{
padding:8px;
border-radius:6px;
border:none;
width:200px;
}

.feedbackBox button{
padding:8px 14px;
border:none;
border-radius:6px;
background:#4a90e2;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<header class="hero">

<h1>NLM Presentation Library</h1>

<input
type="text"
id="searchBar"
placeholder="Search presentations..."
onkeyup="searchPPT()"
/>

<div id="darkToggle">🌙</div>

</header>

<div class="trending">
<h2>🔥 Trending Presentations</h2>
<div id="trendingContainer"></div>
</div>

<div id="loading">Loading presentations...</div>

<div id="pptContainer"></div>

<footer class="footerBar">

<div class="statsBar">

<div>📁 Presentations: <span id="statFiles">0</span></div>
<div>❤️ Total Likes: <span id="statLikes">0</span></div>
<div>💾 Library Size: <span id="statSize">0 MB</span></div>

</div>

<div class="footerContent">

<div>
<strong>Contact Info</strong><br>
Mail: intiaakash314@gmail.com<br>
Contact Number: +91 7702296738
</div>

<div>

<div>Help us with your feedback</div>

<div class="feedbackBox">
<input id="feedbackInput" placeholder="Write feedback...">
<button onclick="sendFeedback()">Send</button>
</div>

</div>

</div>

</footer>

<script>

const username="STRANGER633";
const repo="nlm";
const folder="files";

const container=document.getElementById("pptContainer");
const trendingContainer=document.getElementById("trendingContainer");
const loading=document.getElementById("loading");

let totalSize=0;

/* FILE SIZE */

function formatSize(bytes){
return (bytes/1024/1024).toFixed(2);
}

/* LOAD FILES */

async function loadPPTs(){

const url=`https://api.github.com/repos/${username}/${repo}/contents/${folder}`;

const response=await fetch(url);
const data=await response.json();

let files=[];

data.forEach(file=>{

if(file.name.endsWith(".ppt") || file.name.endsWith(".pptx")){

files.push({
name:file.name,
url:file.download_url,
size:file.size
});

totalSize+=file.size;

}

});

loading.style.display="none";

files.forEach(file=>createCard(file,container));

updateTrending(files);
updateStats(files);

}

loadPPTs();

/* CREATE CARD */

function createCard(file,parent){

let title=file.name.replace(".pptx","").replace(".ppt","");

let thumbnail=`https://raw.githubusercontent.com/${username}/${repo}/main/thumbnails/${title}.png`;

let likes=JSON.parse(localStorage.getItem("pptLikes")) || {};
let likeCount=likes[title] || 0;

let div=document.createElement("div");

div.className = parent.id === "trendingContainer" ? "card trendingCard" : "card";

div.innerHTML=`

<div class="thumb">
<img src="${thumbnail}" onerror="this.src='opengraph-image.png'">
</div>

<div class="cardContent">

<h3>${title}</h3>

<div class="meta">
Size: ${formatSize(file.size)} MB
</div>

<div class="buttons">

<button onclick="viewPPT('${file.url}')">View</button>
<button onclick="presentPPT('${file.url}')">Present</button>
<a href="${file.url}" download>Download</a>

<button class="likeBtn" onclick="toggleLike('${title}',this)">
❤️ <span class="likeCount">${likeCount}</span>
</button>

</div>

</div>
`;

parent.appendChild(div);

}

/* TRENDING */

function updateTrending(files){

let likes=JSON.parse(localStorage.getItem("pptLikes")) || {};

let sorted=[...files].sort((a,b)=>{

let aLikes=likes[a.name.replace(".pptx","").replace(".ppt","")]||0;
let bLikes=likes[b.name.replace(".pptx","").replace(".ppt","")]||0;

return bLikes-aLikes;

});

trendingContainer.innerHTML="";

sorted.slice(0,3).forEach(file=>createCard(file,trendingContainer));

}

/* STATS */

function updateStats(files){

let likes=JSON.parse(localStorage.getItem("pptLikes")) || {};
let totalLikes=0;

Object.values(likes).forEach(v=>totalLikes+=v);

document.getElementById("statFiles").innerText=files.length;
document.getElementById("statLikes").innerText=totalLikes;
document.getElementById("statSize").innerText=formatSize(totalSize)+" MB";

}

/* DARK MODE */

const toggle=document.getElementById("darkToggle");

if(localStorage.getItem("theme")==="dark"){
document.body.classList.add("dark");
}

toggle.onclick=()=>{

document.body.classList.toggle("dark");

if(document.body.classList.contains("dark")){
localStorage.setItem("theme","dark");
}else{
localStorage.setItem("theme","light");
}

};

/* LIKE */

function toggleLike(title,btn){

let likes=JSON.parse(localStorage.getItem("pptLikes")) || {};

if(!likes[title]) likes[title]=0;

likes[title]++;

localStorage.setItem("pptLikes",JSON.stringify(likes));

location.reload();

}

/* VIEW */

function viewPPT(url){
window.open("https://view.officeapps.live.com/op/embed.aspx?src="+encodeURIComponent(url));
}

function presentPPT(url){
window.open("https://view.officeapps.live.com/op/view.aspx?src="+encodeURIComponent(url));
}

/* SEARCH */

function searchPPT(){

let input=document.getElementById("searchBar").value.toLowerCase();
let cards=document.querySelectorAll(".card");

cards.forEach(card=>{

let title=card.querySelector("h3").innerText.toLowerCase();

card.style.display=title.includes(input) ? "block" : "none";

});

}

/* FEEDBACK */

function sendFeedback(){

const text=document.getElementById("feedbackInput").value;

if(!text.trim()) return;

window.location.href =
"mailto:intiaakash314@gmail.com?subject=NLM Website Feedback&body="
+ encodeURIComponent(text);

}

</script>

</body>
</html>
