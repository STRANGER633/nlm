<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NLM v2</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

body{
min-height:100vh;
background:linear-gradient(135deg,#ffffff,#e6ddff,#cbb6ff);
display:flex;
justify-content:center;
padding:40px;
color:#2d1b69;
}

.container{
width:100%;
max-width:1400px;
background:rgba(255,255,255,0.8);
backdrop-filter:blur(12px);
border-radius:20px;
padding:40px;
box-shadow:0 10px 40px rgba(0,0,0,0.1);
}

h1{
text-align:center;
font-size:40px;
margin-bottom:10px;
}

.subtitle{
text-align:center;
opacity:0.8;
margin-bottom:30px;
}

.searchBox{
display:flex;
gap:10px;
margin-bottom:20px;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:8px;
background:rgba(255,255,255,0.15);
color:white;
}

button{
padding:10px 16px;
border:none;
border-radius:8px;
background:#7b5cff;
color:white;
cursor:pointer;
font-weight:500;
}

button:hover{
background:#5f43e9;
}

#results{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:30px;
margin-top:30px;
}

.card{
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:12px;
}

.cardContent h3{
font-size:20px;
font-weight:600;
margin-bottom:12px;
}

.card button, .card a{
margin-right:5px;
margin-top:5px;
display:inline-block;
}

#viewer{
margin-top:40px;
display:none;
}

iframe{
width:100%;
height:500px;
border:none;
border-radius:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>NLM</h1>
<p class="subtitle">PPT Library</p>

<div class="searchBox">
<input id="searchInput" placeholder="Search presentations...">
<button onclick="searchFiles()">Search</button>
</div>

<div id="results"></div>

<div id="viewer">
<h3>Presentation Viewer</h3>
<iframe id="pptViewer"></iframe>
</div>

</div>

<script>
/* FUTURE FEATURE: CATEGORIES

Example structure if needed later:

files/
 ├ cybersecurity/
 ├ cloud/
 ├ networking/

Code idea:

if(file.path.includes("cybersecurity")){
 category="Cyber Security";
}

displayCategory(category);

*/
const username="stranger633";
const repo="nlm";
const folder="files";

async function loadFiles(){

const api=`https://api.github.com/repos/${username}/${repo}/contents/${folder}`;

const response=await fetch(api);
const data=await response.json();

let resultsDiv=document.getElementById("results");
resultsDiv.innerHTML="";

data.forEach(file=>{

if(file.name.endsWith(".ppt") || file.name.endsWith(".pptx")){

let title=file.name
.replace(".pptx","")
.replace(".ppt","")
.replaceAll("_"," ");

let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<h3>${title}</h3>

<button onclick="viewPPT('${file.name}')">View</button>

<button onclick="presentPPT('${file.name}')">Present</button>

<a href="files/${file.name}" download>Download</a>
`;

resultsDiv.appendChild(div);

}

});

}

function viewPPT(file){

let viewer=document.getElementById("viewer");
let frame=document.getElementById("pptViewer");

viewer.style.display="block";

let url=`https://stranger633.github.io/nlm/files/${file}`;

frame.src="https://view.officeapps.live.com/op/embed.aspx?src="+encodeURIComponent(url);

}

function presentPPT(file){

let url=`https://stranger633.github.io/nlm/files/${file}`;

window.open(
"https://view.officeapps.live.com/op/view.aspx?src="+encodeURIComponent(url)+"&wdSlideShow=true",
"_blank"
);

}

loadFiles();

</script>

</body>
</html>
