<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NLM v2</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

body{
min-height:100vh;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
display:flex;
justify-content:center;
padding:40px;
color:white;
}

.container{
width:900px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
border-radius:20px;
padding:40px;
box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

h1{
text-align:center;
font-size:40px;
margin-bottom:10px;
}

.subtitle{
text-align:center;
opacity:0.8;
margin-bottom:30px;
}

.searchBox{
display:flex;
gap:10px;
margin-bottom:20px;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:8px;
background:rgba(255,255,255,0.15);
color:white;
}

button{
padding:10px 15px;
border:none;
border-radius:6px;
background:#00c6ff;
color:white;
cursor:pointer;
}

#results{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:12px;
}

.card h3{
margin-bottom:10px;
}

.card button, .card a{
margin-right:5px;
margin-top:5px;
display:inline-block;
}

#viewer{
margin-top:40px;
display:none;
}

iframe{
width:100%;
height:500px;
border:none;
border-radius:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>NLM</h1>
<p class="subtitle">PPT Library</p>

<div class="searchBox">
<input id="searchInput" placeholder="Search presentations...">
<button onclick="searchFiles()">Search</button>
</div>

<div id="results"></div>

<div id="viewer">
<h3>Presentation Viewer</h3>
<iframe id="pptViewer"></iframe>
</div>

</div>

<script>

const pptDatabase=[

{title:"cloud_computing",file:"files/cloud_computing.pptx"},
{title:"cyber_security",file:"files/cyber_security.pptx"},
{title:"Network Security",file:"files/network_security.pptx"},
{title:"Ethical Hacking Overview",file:"files/ethical_hacking.pptx"}

];

function searchFiles(){

let query=document.getElementById("searchInput").value.toLowerCase();
let resultsDiv=document.getElementById("results");

resultsDiv.innerHTML="";

let results;

if(query===""){
results=pptDatabase;
}else{
results=pptDatabase.filter(item =>
item.title.toLowerCase().includes(query)
);
}

results.forEach(item=>{

let div=document.createElement("div");
div.className="card";

div.innerHTML=`

<h3>${item.title}</h3>

<button onclick="viewPPT('${item.file}')">View</button>

<button onclick="presentPPT('${item.file}')">Present</button>

<a href="${item.file}" download>Download</a>

`;

resultsDiv.appendChild(div);

});

}

function viewPPT(file){

let viewer=document.getElementById("viewer");
let frame=document.getElementById("pptViewer");

viewer.style.display="block";

frame.src="https://view.officeapps.live.com/op/embed.aspx?src="+window.location.origin+"/"+file;

}

function presentPPT(file){

let url="https://view.officeapps.live.com/op/view.aspx?src="+window.location.origin+"/"+file+"&wdSlideShow=true";

window.open(url,"_blank");

}

document.getElementById("searchInput").addEventListener("keypress",function(e){
if(e.key==="Enter") searchFiles();
});

searchFiles();

</script>

</body>
</html>
