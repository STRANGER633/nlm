<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NLM Presentation Library</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
margin:0;
background:linear-gradient(135deg,#dcdcdc,#bfbfbf);
min-height:100vh;
transition:background 0.3s,color 0.3s;
}

/* DARK MODE */

body.dark{
background:#121212;
color:white;
}

/* HEADER */

.hero{
position:sticky;
top:0;
display:flex;
align-items:center;
gap:20px;
padding:20px 30px;
background:rgba(255,255,255,0.55);
backdrop-filter:blur(20px);
border-bottom:1px solid rgba(255,255,255,0.4);
z-index:1000;
}

body.dark .hero{
background:rgba(30,30,30,0.9);
}

.hero h1{
margin:0;
font-size:26px;
flex:1;
}

/* SEARCH */

#searchBar{
width:300px;
padding:12px 16px;
border-radius:10px;
border:none;
outline:none;
background:rgba(255,255,255,0.85);
}

/* DARK BUTTON */

#darkToggle{
cursor:pointer;
font-size:20px;
margin-left:auto;
}

/* GRID */

#pptContainer{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:25px;
padding:40px;
}

/* CARD */

.card{
background:rgba(255,255,255,0.7);
backdrop-filter:blur(12px);
border-radius:16px;
box-shadow:0 8px 30px rgba(0,0,0,0.15);
overflow:hidden;
transition:0.35s;
opacity:0;
transform:translateY(30px);
}

body.dark .card{
background:#1f1f1f;
}

.card.show{
opacity:1;
transform:translateY(0);
}

.card:hover{
transform:scale(1.05) translateY(-5px);
box-shadow:0 18px 45px rgba(0,0,0,0.3);
}

/* THUMB */

.thumb{
height:180px;
position:relative;
overflow:hidden;
}

.thumb img{
width:100%;
height:100%;
object-fit:cover;
}

.thumb::after{
content:"";
position:absolute;
bottom:0;
left:0;
right:0;
height:70px;
background:linear-gradient(to top,rgba(0,0,0,0.55),transparent);
}

/* CONTENT */

.cardContent{
padding:18px;
}

.cardContent h3{
margin:0 0 10px 0;
}

.meta{
font-size:13px;
margin-bottom:12px;
}

/* BUTTONS */

.buttons button,
.buttons a{
padding:7px 12px;
border-radius:8px;
border:none;
background:rgba(255,255,255,0.6);
cursor:pointer;
text-decoration:none;
color:black;
font-size:13px;
margin-right:5px;
}

body.dark .buttons button,
body.dark .buttons a{
background:#333;
color:white;
}

/* LOADING */

#loading{
text-align:center;
font-size:20px;
padding:60px;
}

/* FOOTER 

.footerBar{
background:rgba(255,255,255,0.65);
backdrop-filter:blur(12px);
border-top:1px solid rgba(255,255,255,0.4);
padding:25px;
display:flex;
flex-wrap:wrap;
justify-content:space-between;
align-items:center;
gap:20px;
}*/
.footerBar{

display:flex;
justify-content:space-between;
align-items:center;

padding:20px;

background:#111;
color:white;

margin-top:40px;

flex-wrap:wrap;
gap:20px;

}

.feedbackBox{
display:flex;
gap:10px;
}

.feedbackBox input{

padding:8px;
border-radius:6px;
border:none;
width:200px;

}

.feedbackBox button{

padding:8px 14px;
border:none;
border-radius:6px;

background:#4a90e2;
color:white;

cursor:pointer;

}
body.dark .footerBar{
background:#1c1c1c;
}

.footerInfo{
font-size:14px;
line-height:1.6;
}

/* FEEDBACK */

.feedbackSection{
display:flex;
flex-direction:column;
gap:6px;
}

.feedbackText{
font-size:14px;
font-weight:500;
}

.feedbackBox{
display:flex;
gap:10px;
}

.feedbackBox input{
padding:10px;
border-radius:8px;
border:none;
width:220px;
}

.feedbackBox button{
padding:10px 14px;
border:none;
border-radius:8px;
background:#4a90e2;
color:white;
cursor:pointer;
}

.feedbackBox button:hover{
opacity:0.85;
}

/* TOAST */

#toast{
position:fixed;
bottom:25px;
right:25px;
background:#333;
color:white;
padding:12px 18px;
border-radius:8px;
opacity:0;
pointer-events:none;
transition:0.4s;
}

#toast.show{
opacity:1;
}

/* SCROLL FADE */

.card.fade{
opacity:0.25;
transform:scale(0.96);
}

</style>
</head>
<script>

function sendFeedback(){

const text=document.getElementById("feedbackInput").value;

if(!text.trim()) return;

window.location.href =
"mailto:intiaakash314@gmail.com?subject=NLM Website Feedback&body="
+ encodeURIComponent(text);

}

</script>
<body>

<header class="hero">

<h1>NLM Presentation Library</h1>

<input
type="text"
id="searchBar"
placeholder="Search presentations..."
onkeyup="searchPPT()"
/>

<div id="darkToggle">🌙</div>

</header>

<div id="loading">Loading presentations...</div>

<div id="pptContainer"></div>

<!-- FOOTER -->

<footer class="footerBar">

<div class="footerInfo">
<strong>Contact Info</strong><br>
Mail: noreply@gmail.com<br>
Contact Number: +91 1234567890
</div>

<div class="feedbackArea">

<div class="feedbackText">
Help us with your feedback
</div>

<div class="feedbackBox">

<input id="feedbackInput" placeholder="Write feedback...">

<button onclick="sendFeedback()">Send</button>

</div>

</div>

</footer>

<div id="toast">✔ Feedback message prepared</div>

<script>

const username="STRANGER633";
const repo="nlm";
const folder="files";

const container=document.getElementById("pptContainer");
const loading=document.getElementById("loading");

/* DARK MODE */

const toggle=document.getElementById("darkToggle");

if(localStorage.getItem("theme")=="dark"){
document.body.classList.add("dark");
}

toggle.onclick=()=>{

document.body.classList.toggle("dark");

if(document.body.classList.contains("dark")){
localStorage.setItem("theme","dark");
}else{
localStorage.setItem("theme","light");
}

};

/* FILE SIZE */

function formatSize(bytes){
return (bytes/1024/1024).toFixed(2)+" MB";
}

/* LOAD FILES */

async function loadPPTs(){

const url=`https://api.github.com/repos/${username}/${repo}/contents/${folder}`;

const response=await fetch(url);
const data=await response.json();

let files=[];

data.forEach(file=>{

if(file.name.endsWith(".ppt") || file.name.endsWith(".pptx")){

files.push({
name:file.name,
url:file.download_url,
size:file.size
});

}

});

files.sort((a,b)=>a.name.localeCompare(b.name));

loading.style.display="none";

files.forEach((file,index)=>{

let title=file.name.replace(".pptx","").replace(".ppt","");

let thumbnail=`https://raw.githubusercontent.com/${username}/${repo}/main/thumbnails/${title}.png`;

let div=document.createElement("div");
div.className="card";

div.innerHTML=`

<div class="thumb">
<img src="${thumbnail}" onerror="this.src='opengraph-image.png'">
</div>

<div class="cardContent">

<h3>${title}</h3>

<div class="meta">
Size: ${formatSize(file.size)}
</div>

<div class="buttons">

<button onclick="viewPPT('${file.url}')">View</button>
<button onclick="presentPPT('${file.url}')">Present</button>
<a href="${file.url}" download>Download</a>

</div>

</div>
`;

container.appendChild(div);

setTimeout(()=>{
div.classList.add("show");
},index*120);

});

}

loadPPTs();

/* VIEW */

function viewPPT(url){
window.open("https://view.officeapps.live.com/op/embed.aspx?src="+encodeURIComponent(url));
}

/* PRESENT */

function presentPPT(url){
window.open("https://view.officeapps.live.com/op/view.aspx?src="+encodeURIComponent(url));
}

/* SEARCH */

function searchPPT(){

let input=document.getElementById("searchBar").value.toLowerCase();
let cards=document.querySelectorAll(".card");

cards.forEach(card=>{

let title=card.querySelector("h3").innerText.toLowerCase();

card.style.display=title.includes(input) ? "block" : "none";

});

}

/* SCROLL FADE */

window.addEventListener("scroll",()=>{

const cards=document.querySelectorAll(".card");

cards.forEach(card=>{

const rect=card.getBoundingClientRect();

if(rect.top < 0){
card.classList.add("fade");
}else{
card.classList.remove("fade");
}

});

});

/* FEEDBACK */

function sendFeedback(){

let text=document.getElementById("feedbackText").value;

if(text.trim()=="") return;

const toast=document.getElementById("toast");

toast.classList.add("show");

setTimeout(()=>{
toast.classList.remove("show");
},3000);

window.location.href=`mailto:intiaakash314@gmail.com?subject=NLM Feedback&body=${encodeURIComponent(text)}`;

}

</script>

</body>
</html>
